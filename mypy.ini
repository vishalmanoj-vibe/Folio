[mypy]
# Specify target Python version matching GEMINI.md
python_version = 3.11

# Enable explicit package bases to resolve module mapping conflicts
explicit_package_bases = True

# Allow implicit Optionals (e.g. default value None for parameter typed as str)
no_implicit_optional = False

# Suppress non-critical syntax and import warnings so pre-commit hooks pass cleanly
disable_error_code = var-annotated, union-attr, type-var, assignment, return-value, import-untyped

# Ignore missing imports globally for third-party libraries without type stubs (like dash, yfinance)
ignore_missing_imports = True

# Code quality flags
warn_unused_configs = True
warn_redundant_casts = True
warn_unused_ignores = True

# Folder exclusions
exclude = (?x)(
    ^scratch/
    | ^scripts/
    | ^\.agents/
    | ^docs/
    | ^venv/
  )
